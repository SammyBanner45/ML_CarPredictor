<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Price Predictor</title>
  <meta name="description" content="Predict the resale price of any used car instantly using machine learning. Choose your car brand, model, year, fuel type and mileage.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="card">

    <!-- Header with logo -->
    <div class="card-header">
      <img src="{{ url_for('static', filename='favicon.png') }}" alt="Car Price Predictor logo">
      <div>
        <h1>Car Price Predictor</h1>
        <p>Get an instant ML-powered resale estimate</p>
      </div>
    </div>

    <form id="predict-form">

      <div class="field">
        <label for="company">Company</label>
        <select id="company" onchange="load_car_models()" required>
          <option value="" disabled selected>Select company</option>
          {% for company in companies %}
          <option value="{{ company }}">{{ company }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="car_models">Model</label>
        <select id="car_models" required>
          <option value="" disabled selected>Select model</option>
        </select>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="year">Year</label>
          <select id="year" required>
            {% for year in years %}
            <option value="{{ year }}">{{ year }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label for="fuel_type">Fuel Type</label>
          <select id="fuel_type" required>
            {% for fuel in fuel_types %}
            <option value="{{ fuel }}">{{ fuel }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="field">
        <label for="kilo_driven">Kilometers Driven</label>
        <input type="number" id="kilo_driven" placeholder="e.g. 45000" min="0" required>
      </div>

      <button type="button" class="btn-predict" id="predict-btn" onclick="send_data()">
        Predict Price
      </button>

    </form>

    <!-- Result -->
    <div id="result-box">
      <div class="result-label" id="result-label">Estimated Resale Price</div>
      <div class="result-price" id="result-price"></div>
    </div>

  </div>

  <p class="footer">Powered by Linear Regression &nbsp;·&nbsp; Quickr used-car market data</p>

<script>
  // Exact company → models map injected server-side (no substring guessing)
  var COMPANY_MODELS = {{ company_models | safe }};

  function load_car_models() {
    var companySelect  = document.getElementById('company');
    var modelSelect    = document.getElementById('car_models');
    var selectedCompany = companySelect.value;

    modelSelect.innerHTML = '<option value="" disabled selected>Select model</option>';

    if (!selectedCompany || !COMPANY_MODELS[selectedCompany]) return;

    COMPANY_MODELS[selectedCompany].forEach(function(model) {
      var opt = document.createElement('option');
      opt.value = model;
      opt.text  = model;
      modelSelect.add(opt);
    });
  }

  window.onload = load_car_models;

  function send_data() {
    var company   = document.getElementById('company').value;
    var carModel  = document.getElementById('car_models').value;
    var year      = document.getElementById('year').value;
    var fuelType  = document.getElementById('fuel_type').value;
    var kmDriven  = document.getElementById('kilo_driven').value;

    var resultBox   = document.getElementById('result-box');
    var resultLabel = document.getElementById('result-label');
    var resultPrice = document.getElementById('result-price');
    var btn         = document.getElementById('predict-btn');

    // Basic client-side guard
    if (!company || !carModel || !kmDriven) {
      resultBox.style.display = 'block';
      resultBox.className = 'error';
      resultLabel.textContent = 'Missing fields';
      resultPrice.textContent = 'Please fill in all fields.';
      return;
    }

    // Loading state
    btn.textContent = 'Predicting…';
    btn.disabled = true;
    resultBox.style.display = 'none';

    var fd = new FormData();
    fd.append('company',     company);
    fd.append('car_models',  carModel);
    fd.append('year',        year);
    fd.append('fuel_type',   fuelType);
    fd.append('kilo_driven', kmDriven);

    fetch('/predict', { method: 'POST', body: fd })
      .then(function(res) {
        if (!res.ok) return res.text().then(function(t) { throw new Error(t); });
        return res.text();
      })
      .then(function(price) {
        resultBox.style.display = 'block';
        resultBox.className = '';
        resultLabel.textContent = 'Estimated Resale Price';
        resultPrice.textContent = '₹ ' + Number(price).toLocaleString('en-IN');
      })
      .catch(function(err) {
        resultBox.style.display = 'block';
        resultBox.className = 'error';
        resultLabel.textContent = 'Error';
        resultPrice.textContent = err.message || 'Could not get a prediction.';
      })
      .finally(function() {
        btn.textContent = 'Predict Price';
        btn.disabled = false;
      });
  }
</script>

</body>
</html>
